---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run ShellCheck
        run: find . -name '*.sh' -not -path './out/*' | xargs shellcheck

  shfmt:
    name: Shell Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install shfmt
        env:
          SHFMT_VERSION: v3.13.1
        run: |
          curl -fsSL "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64" \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt

      - name: Run shfmt
        run: shfmt -d -i 2 -ci $(find . -name '*.sh' -not -path './out/*')

  all-checks:
    name: All Checks
    if: always()
    needs:
      - shellcheck
      - shfmt
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more checks failed or were cancelled"
            exit 1
          fi
          echo "All checks passed"
